version: "3.9"

services:
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: zap
    command: >
      zap.sh -daemon
      -host 0.0.0.0
      -port 8090
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
    ports:
      - "8090:8090"

  api:
    build: .
    container_name: fastapi
    depends_on:
      - zap
    ports:
      - "8000:8000"
